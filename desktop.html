<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模拟桌面</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', 'JetBrains Mono', sans-serif;
      overflow: hidden;
      height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    /* 桌面背景 */
    .desktop {
      width: 100%;
      height: 100%;
      position: relative;
      background: 
        radial-gradient(ellipse at 20% 80%, rgba(78, 205, 196, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(233, 69, 96, 0.1) 0%, transparent 50%),
        linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    /* 桌面图标区域 */
    .desktop-icons {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .desktop-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 12px;
      border-radius: 8px;
      transition: all 0.2s ease;
      width: 80px;
    }

    .desktop-icon:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: scale(1.05);
    }

    .desktop-icon:active {
      transform: scale(0.98);
    }

    .icon-image {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: linear-gradient(145deg, #e94560, #c73e54);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    .icon-label {
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      text-align: center;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    /* 任务栏 */
    .taskbar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }

    .taskbar-start {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(145deg, #4ecdc4, #44a08d);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
    }

    .taskbar-time {
      margin-left: auto;
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    /* 搜索引擎窗口 */
    .app-window {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 560px;
      max-width: 90vw;
      background: rgba(26, 26, 46, 0.95);
      border-radius: 12px;
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.08);
      overflow: hidden;
      display: none;
      flex-direction: column;
      z-index: 100;
    }

    .app-window.open {
      display: flex;
      animation: windowOpen 0.3s ease;
    }

    @keyframes windowOpen {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .window-titlebar {
      height: 36px;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }

    .window-buttons {
      display: flex;
      gap: 6px;
    }

    .window-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
    }

    .window-btn.close { background: #ff5f56; }
    .window-btn.minimize { background: #ffbd2e; }
    .window-btn.maximize { background: #27c93f; }

    .window-title {
      flex: 1;
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
    }

    .window-content {
      padding: 40px 32px;
      flex: 1;
    }

    .search-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .search-logo h1 {
      font-size: 42px;
      font-weight: 600;
      background: linear-gradient(135deg, #4ecdc4, #e94560);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .search-box-container {
      position: relative;
      margin-bottom: 24px;
    }

    .search-input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      font-size: 16px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      outline: none;
      transition: all 0.2s ease;
    }

    .search-input:focus {
      border-color: #4ecdc4;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(78, 205, 196, 0.2);
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      opacity: 0.6;
    }

    .search-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .search-btn {
      padding: 10px 24px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
      transition: all 0.2s ease;
    }

    .search-btn:hover {
      background: rgba(78, 205, 196, 0.3);
      color: #fff;
    }

    .suggestions {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 20px;
    }

    .suggestions-title {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      margin-bottom: 12px;
    }

    .suggestion-item {
      padding: 10px 0;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      cursor: pointer;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .suggestion-item:hover {
      color: #4ecdc4;
    }

    .suggestion-item::before {
      content: "🔍";
      font-size: 14px;
    }

    /* 搜索结果区域 */
    .search-results {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .search-results.show {
      display: flex;
    }

    .search-home.show ~ .search-results,
    .search-home:not(.show) ~ .search-results.show {
      display: none;
    }

    .search-home:not(.show) ~ .search-results.show {
      display: flex;
    }

    .results-header {
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .result-item {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: color 0.2s;
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .result-item:hover {
      color: #4ecdc4;
    }

    .result-title {
      color: #4ecdc4;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .result-url {
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .result-desc {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      line-height: 1.5;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      display: none;
      z-index: 99;
    }

    .overlay.show {
      display: block;
    }

    /* 搜索结果区域 */
    .search-results {
      display: none;
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
    }

    .search-results.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-item {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: background 0.2s;
    }

    .result-item:hover {
      background: rgba(78, 205, 196, 0.1);
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .result-title {
      color: #4ecdc4;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .result-url {
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .result-snippet {
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      line-height: 1.4;
    }

    .back-to-search {
      margin-bottom: 16px;
      color: #4ecdc4;
      cursor: pointer;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .back-to-search:hover {
      text-decoration: underline;
    }

    .search-home { display: block; }
    .search-home.hidden { display: none; }
  </style>
</head>
<body>
  <div class="desktop">
    <div class="desktop-icons">
      <div class="desktop-icon" id="searchApp" title="点击打开搜索引擎">
        <div class="icon-image">🔎</div>
        <span class="icon-label">Vibe搜索</span>
      </div>
    </div>

    <div class="taskbar">
      <div class="taskbar-start">⊞</div>
      <span class="taskbar-time" id="clock">00:00</span>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>

  <div class="app-window" id="searchWindow">
    <div class="window-titlebar">
      <div class="window-buttons">
        <button class="window-btn close" id="closeBtn"></button>
        <button class="window-btn minimize"></button>
        <button class="window-btn maximize"></button>
      </div>
      <span class="window-title">Vibe搜索 - 模拟搜索引擎</span>
    </div>
    <div class="window-content">
      <div class="search-home" id="searchHome">
        <div class="search-logo">
          <h1>Vibe Search</h1>
        </div>
        <div class="search-box-container">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="searchInput" placeholder="输入关键词搜索..." autocomplete="off">
        </div>
        <div class="search-buttons">
          <button class="search-btn" id="searchBtn">Vibe 搜索</button>
          <button class="search-btn" id="luckyBtn">手气不错</button>
        </div>
        <div class="suggestions">
          <div class="suggestions-title">热门搜索建议</div>
          <div class="suggestion-item" data-query="人工智能最新进展">人工智能最新进展</div>
          <div class="suggestion-item" data-query="2025年科技趋势">2025年科技趋势</div>
          <div class="suggestion-item" data-query="机器学习入门教程">机器学习入门教程</div>
          <div class="suggestion-item" data-query="前端开发最佳实践">前端开发最佳实践</div>
        </div>
      </div>
      <div class="search-results" id="searchResults">
        <div class="back-to-search" id="backToSearch">← 返回搜索</div>
        <div class="results-header" id="resultsHeader">约 0 条结果</div>
        <div id="resultsList"></div>
      </div>
    </div>
  </div>

  <script>
    const searchApp = document.getElementById('searchApp');
    const searchWindow = document.getElementById('searchWindow');
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('closeBtn');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const suggestionItems = document.querySelectorAll('.suggestion-item');

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = 
        now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    updateClock();
    setInterval(updateClock, 1000);

    searchApp.addEventListener('click', () => {
      searchWindow.classList.add('open');
      overlay.classList.add('show');
      showHome();
      searchInput.focus();
    });

    function closeWindow() {
      searchWindow.classList.remove('open');
      overlay.classList.remove('show');
    }

    closeBtn.addEventListener('click', closeWindow);
    overlay.addEventListener('click', closeWindow);

    const searchHome = document.getElementById('searchHome');
    const searchResults = document.getElementById('searchResults');
    const resultsList = document.getElementById('resultsList');
    const resultsHeader = document.getElementById('resultsHeader');
    const backToSearch = document.getElementById('backToSearch');
    const luckyBtn = document.getElementById('luckyBtn');

    const mockResults = [
      { title: '关于「' + '{{query}}' + '」的百科介绍', url: 'https://vibe-search.example/wiki/{{query}}', snippet: '这是一个模拟的搜索结果。Vibe Search 是桌面上的模拟搜索引擎，为您提供沉浸式的搜索体验。' },
      { title: '{{query}} - 官方文档', url: 'https://docs.vibe-search.example/{{query}}', snippet: '深入了解相关主题的详细文档和教程。包含入门指南、最佳实践和常见问题解答。' },
      { title: '{{query}} 最新动态与资讯', url: 'https://news.vibe-search.example/{{query}}', snippet: '获取最新的行业资讯、技术更新和专家观点。保持对前沿趋势的敏感度。' },
      { title: '社区讨论：{{query}}', url: 'https://forum.vibe-search.example/topic/{{query}}', snippet: '参与社区讨论，与其他爱好者交流心得。分享你的见解，获取他人的经验。' },
      { title: '{{query}} 视频教程', url: 'https://video.vibe-search.example/{{query}}', snippet: '通过视频学习，直观易懂。从零基础到进阶，应有尽有。' }
    ];

    function generateResults(query) {
      return mockResults.map(r => ({
        title: r.title.replace(/\{\{query\}\}/g, query),
        url: r.url.replace(/\{\{query\}\}/g, encodeURIComponent(query)),
        snippet: r.snippet.replace(/\{\{query\}\}/g, query)
      }));
    }

    function doSearch(query) {
      if (!query.trim()) return;
      const results = generateResults(query);
      searchHome.classList.add('hidden');
      searchResults.classList.add('show');
      resultsHeader.textContent = '约 ' + results.length + ' 条结果 (模拟)';
      resultsList.innerHTML = results.map(r =>
        '<div class="result-item"><div class="result-title">' + r.title + '</div>' +
        '<div class="result-url">' + r.url + '</div>' +
        '<div class="result-snippet">' + r.snippet + '</div></div>'
      ).join('');
    }

    function showHome() {
      searchHome.classList.remove('hidden');
      searchResults.classList.remove('show');
    }

    backToSearch.addEventListener('click', showHome);

    luckyBtn.addEventListener('click', () => {
      const queries = ['人工智能', '机器学习', '前端开发', '创意设计', '科技趋势'];
      const q = queries[Math.floor(Math.random() * queries.length)];
      searchInput.value = q;
      doSearch(q);
    });

    searchBtn.addEventListener('click', () => doSearch(searchInput.value));

    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') doSearch(searchInput.value);
    });

    suggestionItems.forEach(item => {
      item.addEventListener('click', () => {
        const query = item.getAttribute('data-query');
        searchInput.value = query;
        doSearch(query);
      });
    });
  </script>
</body>
</html>
